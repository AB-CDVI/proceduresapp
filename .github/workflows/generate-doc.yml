name: Generate Word Document

on:
  workflow_dispatch:
    inputs:
      procedure_id:
        description: 'Procedure ID'
        required: true
      user_name:
        description: 'User name (for output folder)'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install docx

      - name: Generate Word document
        run: node generate.js "${{ github.event.inputs.procedure_id }}" "${{ github.event.inputs.user_name }}"

      - name: Commit generated document
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "doc: ${{ github.event.inputs.procedure_id }}"
          git push
